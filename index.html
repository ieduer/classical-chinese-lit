<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高考默写</title>
    <!-- Add Favicon -->
    <link rel="icon" href="https://raw.githubusercontent.com/gptv/suen/main/images/Avatar-small.jpeg" type="image/jpeg">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Rest of the body remains the same -->
    <header>
        <button id="mobile-menu-toggle" aria-label="Toggle Menu" aria-expanded="false">☰</button>
        <h1 id="main-title">高考默写</h1>
        <button id="dark-mode-toggle" title="切換模式">🌗</button>
    </header>

    <div id="mobile-nav-overlay" class="mobile-nav" aria-hidden="true">
        <div class="mobile-nav-content">
            <button id="mobile-nav-close" aria-label="Close Menu">×</button>
            <h2>目錄</h2>
            <ul id="mobile-poem-list">
                <!-- Mobile list will be populated by JS -->
            </ul>
        </div>
    </div>

    <div class="main-container">
        <nav id="left-nav" class="side-nav">
            <h2>文言文</h2>
            <div class="scroll-indicator top" aria-hidden="true">▲</div>
            <ul id="wenyanwen-list" class="poem-list-container">
                <li>載入中...</li>
            </ul>
            <div class="scroll-indicator bottom" aria-hidden="true">▼</div>
        </nav>

        <main id="center-content">
            <div id="placeholder-text">
                <h2>歡迎來到 高考默写</h2>
                <p>請從左右兩側的目錄中選擇一篇詩文開始閱讀。</p>
                <p>本站點收錄了常見的古典詩文篇目，旨在提供一個簡潔、舒適的閱讀和學習環境。</p>
                <p>標有 <span class="exam-marker-example">[京YYYY]</span> 或 <span class="exam-marker-example">[QYYYY]</span> 標記的段落表示曾在北京或全國高考默寫中出現。</p>
                <p>帶有彩色背景的目錄項表示該篇目包含往年真題。</p>
            </div>
            <article id="poem-display-area" style="display: none;">
                <div class="poem-main-text">
                    <!-- Main poem text will be rendered here -->
                </div>
                <div class="exam-questions">
                     <!-- Exam questions will be rendered here -->
                </div>
            </article>
        </main>

        <nav id="right-nav" class="side-nav">
            <h2>诗词曲</h2>
            <div class="scroll-indicator top" aria-hidden="true">▲</div>
            <ul id="shiciqu-list" class="poem-list-container">
                <li>載入中...</li>
            </ul>
            <div class="scroll-indicator bottom" aria-hidden="true">▼</div>
        </nav>
    </div>

    <aside id="ai-chat-interface" style="display: none;">
        <button id="ai-close-btn" title="關閉">✕</button>
        <h3>AI 助手</h3>
        <div id="ai-messages"></div>
        <div class="ai-input-area">
            <input type="text" id="ai-input" placeholder="輸入你的問題...">
            <button id="ai-send-btn">發送</button>
        </div>
    </aside>
    <button id="open-ai-btn" title="打開 AI 助手">💬</button>

    <footer>
        <p>© 2025 <a href="https://bdfz.net/posts/rag/" target="_blank" rel="noopener noreferrer">SUEN</a></p>
    </footer>

    <script src="js/script.js" defer></script>
    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "r18imbklh8");
    </script>
</body>
</html>
